<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인</title>
    <style>
        .login-wrap{
            width: 400px;
            /* height: 500px; */ /*구역 확인용*/
            border: 1px solid black;
            margin: 0 auto;
            padding: 20px;
        }
        .image-wrap{
            width: 200px;
            height: 200px;
            border: 1px solid black;
            margin: 0 auto;
        }

        .user-info-wrap{
            width: 358px;
            /* height: 250px; */ /*구역 확인용*/
            border: 1px solid black;
            margin: 0 auto;
            margin-top: 38px;
        }
        .image-wrap img{  /* 이미지영역안에 이미지태그 채우기*/
                          /* 이미지영역 (이미지태그의 부모)의 크기가 있어야 함*/
            width: 100%;
            height: 100%;

            object-fit: cover; 
            /*이미지를 박스 안에 에쁘게 꽉채우기*/
            /*이미지만 있으면 쓸 수 없음. 
            이미지를 감싸고 있는 박스가 있어야 해당 "이미지"에 적용할 수 있음*/;
        }
        .user-info-wrap input, button{
            width: 100%;
            padding: 10px;
            box-sizing: border-box; 
            /*padding을 주면 자연스럽게 사이즈가 커지는데
              box-sizing: border-box;를 주면 여기서는 이상적인 100%로 맞춰진다.
              (∵ width: 100%;)*/
        }

    </style>
</head>
<body>
    <div class="login-wrap">
        <!-- 이미지 영역 -->
        <div class="image-wrap">
            <img src="https://cdn.imweb.me/upload/S20210807d1f68b7a970c2/7170113c6a983.jpg" alt="">
        </div>

        <!-- 로그인정보 영역 -->
        <div class="user-info-wrap">
            <input type="text">
            <input type="password">
            <button>로그인</button>
        </div>
    </div>
    
</body>
</html>
