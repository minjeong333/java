    <style>
      header {
        height: 100px;

      }
      nav {
        height: 60px;
        background-color: #796262;
      }
      section {
        height: 500px;
        /* background-color: rgb(132, 218, 132); */
      }
      footer {
        height: 100px;
        background-color: indianred;

        position: absolute; /*부모를 기준, top, left, right, bottom 사용 가능*/

        display: flex;
        flex-direction: row;
      }
      .title {
        background-color: red;
        width: 100px;

        /* position: absolute; 부모를 기준, top, left, right, bottom 사용 가능 */
        top: 0;
        left: 20px;
      }
      .search-bar {
        width: 200px;
        height: 40px;
        border: 1px solid black;
        display: flex;
        right: 20px;
        bottom: 10px;
      }
      .search-text {
        width: 100px;
        border: none;
        outline: none;
        padding: 10px;
        box-sizing: border-box;
      }
      .search-img {
        width: 40px;
        border: 1px solid blue;
        /*background-color: red; */ /*이미지 넣을 공간에 배경색 먼저 넣어보기*/

        /*특정 영역에 이미지를 채울 때는 이 3개가 세트!!*/
        background-image: url(https://e7.pngegg.com/pngimages/796/404/png-clipart-computer-icons-search-box-others-miscellaneous-apartment.png);
        background-size: cover;
        background-position: center;
      }
      .footer-item {
        border: 1px solid blue;
        width: 33.3%;
        padding: 10px;
      }
      /*상품목록 만들기 css*/
      section ul{
        list-style: none;
        margin: 0;
        border: 1px solid red;

        display: flex;
        flex-direction: row;
        flex-wrap: wrap;
        margin: 0 auto;

      }
      section ul li{
        width: 300px;
        height: 300px;
        border: 1px solid black;
        text-align: center;  
      }

      section  ul li img{
        width: 70%;
      }


      nav ul{
        list-style: none;
        display: flex;
      }
      nav ul li{
        padding: right;
      }

      /**/

      a{
        text-decoration: none; /*밑줄 빼기*/
        color: whitesmoke;
      }
      
    </style>
