<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>switch</title>
</head>
<body>
    
    <script>
        while(true){  
            let num = prompt("숫자를 입력하시오");
            if(num == "stop") break; 
            alert( num);
             
         }
      
    </script>
</body>
</html>
