<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수맞추기게임2</title>
</head>
<body>
    
    <script>

        let input;
        let randomSu;
        let tryCnt = 0;

        randomSu = Math.floor( (Math.random()*100)) +1; //1~100
        console.log(randomSu);

        while(true){

            //탈출조건 같으면 탈출
            input = prompt("수를 입력하시오");
            tryCnt = tryCnt +1;


            if( randomSu == input) break; // 탈출조건(같으면 탈출)
            
            //더 큰 수 혹은 더 작은 수 
            if(input < randomSu){
                alert("더 큰 수를 입력하시오");
            }else if(input > randomSu){
                alert("더 작은 수 입력하시오");
            }
        }


        //
        if(tryCnt <=3){
            alert("간식성공");
        }else{
                alert(tryCnt+"성공");
        }


</script>
</body>
</html>
