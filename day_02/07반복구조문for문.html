    <script>

        //반복문
        //반복횟수를 저장할 변수

        //반복문: for문, while문
        // for => 반복횟수가 정해진 경우
        // while => 반복횟수가 정해져 있지 않은 경우, 특정조건으로 반복할 때
        


        //for(초기식; 조건식; 증감)
        //초기식은 단 한 번 -> 조건식 검사 -> 실행 -> 증감 -> 조건식 검사 -> ...
        for(let i=1; i<=5; i++){ //중괄호블럭문을 반복하시오
                alert("for ~~hi");
        }



        //while문
        //3번 인사하기

        let n=0;

        while(n < 3){  //조건이 만족할 동안 반복
            n=n+1;
            alert("while ~~~ hi");
        }
        
        /*
        (n=0으로 시작)
           n => 1
           인사

           n=>2
           인사

           n=>3
           인사
        */


    </script>
