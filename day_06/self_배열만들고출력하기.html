<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열만들고출력</title>
</head>
<body>
    <script>
        let color=["red", "green", "blue", "pink", "yellow"];

        // 출력하기

        document.write("<h1>배열 출력하기</h1>")
        //1. 반복문 사용안하기

        document.write("<h3>sol1)반복문 사용안하기</h3>")
        document.write(color[0]+"<br>");
        document.write(color[1]+"<br>");
        document.write(color[2]+"<br>");
        document.write(color[3]+"<br>");
        document.write(color[4]+"<br>");


        //2. 반복문 사용하기
        document.write("<h3>sol2)반복문 사용하기</h3>")
        for(let i=0; i<color.length; i++){
            document.write(color[i]+"<br>");
        }

        //3. forEach사용해보기
        document.write("<h3>sol3)forEach 사용하기</h3>");

        color.forEach( function(A,B){
            document.write(A +"<br>");
            // document.write(B);
        });




    </script>
</body>
</html>
