<body>
    <script>
        // fill(): 배열의 요소에 특정값으로 채우는 매서드
        let arr=[];
        let arr2 = new Array(3);//length: 3

        console.log(arr);
        console.log(arr2);

        arr2.fill(3);//배열을 전부 3으로 채우기

    </script>
