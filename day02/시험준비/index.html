<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인페이지</title>
    <style>
        header{
            height: 100px;
            background-color: lightblue;

            position: relative;
        }
        nav{
            height: 60px;
            background-color: rgb(167, 86, 86);
        }
        section{
            height: 500px;
            background-color: rgb(132, 218, 132);
        }
        footer{
            height: 100px;
            background-color: indianred;

            display: flex;
            flex-direction: row;
        }
        .title{
            background-color: red;
            width: 100px;

            position: absolute; /*부모를 기준, top, left, right, bottom 사용 가능*/
            top: 0;
            left: 20px;

        }
        .search-bar{
            background-color: yellow;
            width: 100px;

            position: absolute;
            right: 0;
            bottom: 0;
        }
        .footer-item{
            border: 1px solid black;
            width: 33.3%;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header>
        <div class="title">title 이미지</div>
        <div class="search-bar">검색바</div>
    </header>
    <nav>
        회원가입 로그인
    </nav>
    <section></section>
    <footer>
        <div class="footer-item">Acorn</div>
        <div class="footer-item">연락처</div>
        <div class="footer-item">기본정보</div>
    </footer>
</body>

</html>
