    <script>
      //  17.  원의 넓이 구하기 : 지름을 입력받아 원의 넓이 구하기

      let D;
      D = prompt("원의 지름을 입력하세요");
      let result = Math.PI * (D / 2) * (D / 2);
      alert("원의 넓이는" + result + "입니다.");
    </script>
