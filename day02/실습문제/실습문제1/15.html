<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //  15.   9번을  음수가  입력될 때 까지 반복하기

      while (true) {
        let num = prompt("음수 입력될 때까지 반복됩니다.");
        let 지수 = 2;
        let result = num ** 지수;
        if (num < 0) break;
        alert(num + " 의 제곱은 " + result);
      }
    </script>
  </body>
</html>
