<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 13.  "stop"입력될 때까지 입력한 입력을 출력하기

      while (true) {
        let num = prompt(
          "원하는 숫자를 입력하세요 (멈추고 싶다면 stop을 입력하세요)",
        );
        if (num == "stop") break; // while 을 빠져나감
        alert(num);
      }
    </script>
  </body>
</html>
