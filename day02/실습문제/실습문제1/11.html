<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //  11. 사칙연산 계산기  (if, switch문)
      // 사용자가 입력한 두 숫자와 연산자(+, -, *, /)를 사용하여 결과를 출력하세요.

      let num1 = parseInt(prompt("첫번째 수를 입력하세요"));
      let num2 = parseInt(prompt("두번째 수를 입력하세요"));
      let cal = prompt("원하는 연산자를 선택하세요(+, -, *, /)");

      switch (cal) {
        case "+":
          alert("계산결과: " + (num1 + num2));
          break;
        case "-":
          alert("계산결과: " + (num1 - num2));
          break;
        case "*":
          alert("계산결과: " + (num1 * num2));
          break;
        case "/":
          alert("계산결과: " + (num1 / num2));
          break;
      }
    </script>
  </body>
</html>
