<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      /*  8. 점수에 따른 등급 
        사용자가 입력한 점수에 따라 다음 등급을 출력하세요:

        90점 이상: "A"
        80점 이상: "B"
        70점 이상: "C"
        60점 이상: "D"
        60점 미만: "F"
    */

      let num = prompt("점수를 입력하세요");

      if (num >= 90) {
        alert("A학점");
      } else if (num >= 80) {
        alert("B학점");
      } else if (num >= 70) {
        alert("C학점");
      } else if (num >= 60) {
        alert("D학점");
      } else {
        alert("F학점");
      }
    </script>
  </body>
</html>
