  <body>
    <script>
      // 4. 최대값 구하기
      // 사용자가 입력한 세 개의 숫자 중 가장 큰 숫자를 출력하세요.

      let num1 = prompt("1번째 숫자를 입력하세요");
      let num2 = prompt("2번째 숫자를 입력하세요");
      let num3 = prompt("3번째 숫자를 입력하세요");
      alert("가장 큰 수는 " + Math.max(num1, num2, num3) + "입니다.");
    </script>
  </body>
