<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //2) 입력한 수가  3의 배수인지 확인하기

      let num = prompt("수를 입력하세요");
      let result = num % 3;
      if (result == 0) {
        alert("3의 배수입니다");
      } else {
        alert("3의 배수가 아닙니다");
      }
    </script>
  </body>
</html>
