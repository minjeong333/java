<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //  3.  이름 , 국어, 영어, 수학 3과목이 입력될 때   총점과  평균을 출력하기

      let name = prompt("이름을 입력하세요");
      let korean = prompt("국어 점수를 입력하세요");
      let english = prompt("영어 점수를 입력하세요");
      let math = prompt("수학 점수를 입력하세요");

      let total = parseInt(korean) + parseInt(english) + parseInt(math);
      let average = total / 3;

      alert(
        name +
          "님의 국영수 총점은 " +
          total +
          "점 이고, 평균은 " +
          average +
          "점 입니다.",
      );
    </script>
  </body>
</html>
