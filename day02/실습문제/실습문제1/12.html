<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      //  12. 홀수만 출력
      // 사용자가 입력한 숫자 N(임의의 수)까지의 숫자 중 홀수만 출력하세요.
      //ex) n=5 이면 1~5까지 중에 홀수만

      let num = prompt("숫자를 입력하세요");

      for (i = 1; i <= num; i++) {
        if (i % 2 == 1) {
          document.write(i + "<br>");
        }
      }
    </script>
  </body>
</html>
