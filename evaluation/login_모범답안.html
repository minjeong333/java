<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <style> 
        header{
            height: 100px;
            background-color: rgb(245, 248, 248);
            position: relative; /*규칙 따위 무시하고 내가 원하는 곳에 좌표를 찍기 위해
                                 부모로 설정 -> 다른 요소들이 어디 있든 내가 원하는 위치에 "겹쳐서"width: 
                                 둘 수 있음 ex) 이미지 위에 띄운 sale아이콘*/
        }
        .title{
            position: absolute; /*relative가 있는 부분(부모)의 자식으로 설정*/
            left: 10px;
            top: 20px;
        }
        .search{
            /* width: 400px; */
            width: 200px; /*input 150px + img 50px*/
            height: 50px;
            position: absolute;
            right: 10px;
            bottom: 20px;
            /* border: 1px solid black; */
            display: flex;  /*input이랑 이미지를 나란히*/
        }
        /*⭐search 안에 input태그 수식 추가해주기 */
        .search input{
            width: 150px;
            border: none;
            outline: none; /*border:none 과 outline:none을 같이 쓰는 이유
                            브라우저가 기본적으로 제공하는 모든 시각적 피드백을 완전히 제거하고,
                            내가 직접 디자인한 스타일만 입히겠다!!! (=완젹한 zero-base를 만드는 것)*/
        }
        .search-img{
            /* position: absolute; */
            /* right: 10px; */
            /*width: 40px;*/ /*크기 맞추는 거 다시 공부하기*/
            width: 50px; /*너비 & 높이 설정하는 거 잊지 않기*/
            height: 50px;
            /* border: 2px solid blue; */
            background-image: url(./images/검색.png);
            background-size: cover;
            background-position: center;

        }
        nav{
            height: 40px;
            padding: 20px;
            background-color: rgb(232, 243, 243);
        }
        nav a{
            text-decoration: none;
            color: black;
            /*padding 조절 -> a태그 간 간격이 멀어짐 추가*/
            padding: 5px;
        }
        .log_wrap{
            width: 400px;
            padding: 20px;
            border: 0.5px solid rgb(234, 222, 222) ;
            /* display: flex;
            flex-direction: column;
            justify-content: center; */
            margin: 0 auto;
            
        }
        .log_img{
            /* border: 1px solid red; */
            /* margin-left: 50px; */
            margin: 0 auto;
            width: 300px;
            height: 300px;
            background-image: url(./images/login_logo.jpg);
            background-position: center ;
            background-size: cover;
            
        }
        .log_info{
            padding: 10px;
        }
        .log_info input{
            width: 98%;
            height: 40px;
            margin-top: 5px;
        }
        .log_info button{
            width: 100%;
            height: 50px;
            background-color: silver;
            border: 0px;
            margin-top: 10px;

        }
        footer{
            height: 60px;
            background-color: rgb(233, 239, 239);
            display: flex;
        }
        .item{
            width: 33%;
            height: 60px;
            /*윗쪽 공간 살짝 만들기 추가*/
            padding-top: 20px;
        }
    </style>
    <script>
    function check(){
        const frm=document.frm;  /*document.폼이름*/
        // console.log(frm);
        const id = frm.id;  /*input 태그(id)의 내용 = id의 내용으로 */
        // console.log(id);
        const pw = frm.pw;  /*/*input 태그(pw)의 내용 =pwd의 내용으로 */
        // console.log(pw);
        if(id.value==""){
            alert("아이디를 입력하세요");
            id.focus(); /*alert창 확인 후에 사용자가 바로 입력할 수 있게*/
        }else if(pw.value==""){
            alert("비밀번호를 입력하세요");
            pw.focus();
        }else{
            alert("로그인 성공");
        }
    }
        
    </script>
</head>
<body>
    <header>
    <div class="title">
        <img src="./images/logo.png" alt="">
    </div>
    <div class="search">
        <input type="text">
         <div class="search-img"></div>
    </div>
    </header>
    <nav>
        <a href="./login.html">로그인</a>
        <a href="#">회원가입</a>
        <a href="./index.html">홈으로</a>
    </nav>
    <section>
        <form action="" name="frm" method="post">
        <div class="log_wrap">
            <div class="log_img"></div>
            <div class="log_info">
                <input type="text" placeholder="아이디" name="id">
                <input type="password" placeholder="비번" name="pw">
                <button type="button" onclick="check()">로그인</button>
            </div>
        </div>
        </form>
    </section>
    <footer>
        <div class="item"><img src="./images/footer_acorn.png" alt=""></div>
        <div class="item">(주)에이콘이즈 에이콘아카데미(홍대)</div>
        <div class="item">COPYRIGHT(C) HBILAB ALL RIGHTS RESERVED</div>
    </footer>
</body>
</html>
