<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>식_표현식</title>
</head>
<body>
    
    <h3>식 또는 표현식</h3>

    <script>
        /*

        식은 값을 얻어내는 코드(단위)

        1+2 //3
        "hi" // "hi"
        true // true
        //선언한 변수를 사용한다면 그것도 식
        let a=100 : 이건 변수 선언문이지 식이 아님
        a // 식
        10>11 // false
        Math.max(3,5) // 5 => 함수의 결과도 식
        const result = (10>5) ? "크다" : "작다"; // 삼항연산자도 식을 만들어 냄

        */
    </script>
</body>
</html>
