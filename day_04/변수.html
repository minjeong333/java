<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>


        //변수선언 위치에 따라 전역변수, 지역(함수)변수, 블럭변수 (중괄호 블럭) : for. if

        //블럭변수예시

        for(let i=1; i< 5; i++){ 
            // (i변수를 사용할 수 있다 for문 밖에서는 사용 x)
            document.write("자바스크립트 재밌어요^^^");
        }

        // document.write(i); i변수는 선언되지 않는 변수로 오류가 남.
        //                     for 안의 변수를 사용할 수 없다


        if(5>3){
            let result="5가 크다";
            document.write("if블럭 안에서  선언된 변수 사용하기" + result);
        }

       // document.write("if블럭 안에서  선언된 변수 사용하기" + result);
       // => if블럭 안에서 선언된 변수는 밖에서 사용불가
       
       
       // 임의로 블럭을 만들어 사용할 수 있다
       // 변수의 스코프(유효범위)를 줄일 수 있다

    {

        let k =10;
        document.write(k);
    
    }
    
    { 

        let k=10;
        document.write(k);

    }

    </script>
</body>
</html>
