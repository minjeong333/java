    <script>
      // ver3
      // 1. 제목만
      function getTitle(dan) {
        return `<h3>--- ${dan}단 ---</h3>`;
      }
      // 2. 구구단 내용만
      function getBody(dan) {
        let result = "";
        // *5까지만 나오게 함
        for (let i = 1; i <= 5; i++) {
          result += `${dan} * ${i} = ${dan * i}<br>`;
        }
        return result + "<br>"; // 단 사이 공백추가(가시성)
      }
      let finalResult;
      // 원하는 단까지 조절
      for (let dan = 1; dan <= 3; dan++) {
        // 제목, 내용 합치게
        finalResult = getTitle(dan) + getBody(dan);
        // 화면에 출력
        document.write(finalResult);
      }
