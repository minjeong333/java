<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트객체활용</title>
</head>
<body>

    <h2>이벤트 객체</h2>

    <p>이벤트가 발생하면 이벤트에 관련된 정보가 객체형태러 만들어진다</p>
    <p>이벤트객체는 이벤트핸들러함수에게 (자동으로) 전달</p>


    <input type="text" placeholder="검색어" id="search">

    
    <script>
        //keyup => 이벤트
        //onkeyup => 이벤트리스너
        //function(){} => 이벤트 핸들러 함수


       const search = document.getElementById("search");
       search.addEventListener("keyup" , function( e){  // keyup을 들으면 함수 e를 실행시켜라
        // console.log("hello");

        if(e.key=="Enter"){
            alert("검색중------");
        }
       });

    </script>
</body>
</html>
