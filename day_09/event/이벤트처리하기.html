<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이벤트처리하기1</title>
    <script>
        function clickHandler(){
            alert("dfdf");
        }
    </script>
</head>
<body>
    <!-- click => 이벤트 -->
    <!-- 이벤트리스너 => onclick -->
    <!-- 이벤트핸들러 => clickHandler -->

    <!-- 코드를 직접 넣는 것 -->
    <button onclick="alert('hi')">클래해라</button> 

    <!-- 함수로 빼서 작성 -->
    <button onclick="clickHandler()">클릭해봐!!!!</button>
</body>
</html>
