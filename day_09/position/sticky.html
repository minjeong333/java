<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>sticky</title>
    <style>
        li:nth-child(1){
            background-color: red;
            height: 100px;
        }
        li:nth-child(2){
            background-color: orange;
            position: sticky; /* 일정위치에 도달하면 고정*/
            top: 10px;        /* ∴ 꼭 위치를 정해줘야 함 */
        }
        li:nth-child(3){
            background-color: greenyellow;
        }
        li:nth-child(4){
            background-color: plum;
            height: 2000px;
        }
    </style>
</head>
<body>

    <!-- sticky는 해당위치에 왔을 때만 고정됨
         = fixed와의 차이!! -->
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>4</li>
    </ul>
</body>
</html>
