    <script>


    // 한달 메뉴추천해주는 함수
    // 2차원배열로 한 달 메뉴정보를 반환하기


        //기능:
        //입력: x
        //반환: 한 달 메뉴 반환하기, 2차원배열
        
        function 메뉴추천한달(){
            let week1=["김밥", "돈까스", "스시", "카레", "제육"];
            let week2=["김밥2", "돈까스2", "스시2", "카레2", "제육2"];
            let week3=["김밥3", "돈까스3", "스시3", "카레3", "제육3"];
            let week4=["김밥4", "돈까스4", "스시4", "카레4", "제육4"];

            let menus=[week1, week2, week3, week4];
            return menu;
        }
    


        let 추천메뉴결과 = 메뉴추천한달();
        alert(추천메뉴결과); //배열을 그냥 출력
                             //요소를 하나의 문자열로 반환해주는
                             //toString매서드가 자동으로 동작해서 얻은 결과를 출력한다

        //배열 -> 배열의 요소를 접근해서 사용!!
        //행, 열 => 기억장소 한 칸에 접근한다!!
        
        

        for (let k=0; k<추천메뉴결과.length; i++){  // 추천메뉴결과.length => 행의 개수 => 4

            // k => 행 인식
            for (let i=0; i<추천메뉴결과[i].length; i++){
                // i => 열 인식
                document.write(추천메뉴결과[k][i] + ",");
            }
            document.write("<br>");
        }



    </script>
