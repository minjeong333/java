<!DOCTYPE html>

    <title>배열만들고공유하기</title>

<body>
    <script>
      //배열만들기 문제 예시  ( 1차원 2차원  3차원 맘껏 사용하기  꼭 3차원을 사용하지 않아도 됨)
      
      //1차원 배열
      let 먹고싶은것= ["치킨", "피자", "떡볶이", "볶음밥", "케이크"]; 

        

      //2차원배열
      let 가고싶은곳 =[
         ["롯데월드", "홍대", "성수", "코인노래방", "팝업스토어"],   //10대
         ["이태원", "익선동", "더현대서울", "부산", "한강공원"],   //20대
         ["여의도", "가로수길", "남산", "종로", "망원"]    //30대
      ] ;
 
      let 보고싶은영화=[
        ["스파이더맨: 노 웨이 홈", "인사이드아웃", "겨울왕국", "해리포터", "너의 이름은"],   //10대
        ["라라랜드", "기생충", "어바웃타임", "범죄도시", "극한직업"],   //20대
        ["인셉션", "미나리", "아바타", "도둑들", "부산행"]    //30대
      ];
 
    
    let 하고싶은것들 = [
        let 가고싶은곳 = [
            ["롯데월드", "홍대", "성수", "코인노래방", "팝업스토어"],   // 10대
            ["이태원", "익선동", "더현대서울", "부산", "한강공원"],   // 20대
            ["여의도", "가로수길", "남산", "종로", "망원"]            // 30대
        ],
        let 보고싶은영화=[
            ["스파이더맨", "인사이드아웃", "겨울왕국", "해리포터", "너의 이름은"], // 10대
            ["라라랜드", "기생충", "어바웃타임", "범죄도시", "극한직업"],      // 20대
            ["인셉션", "미나리", "아바타", "도둑들", "부산행"]                 // 30대
        ]
    ];

    let choice = prompt("추천받고 싶은 것을 선택하세요 1. 장소  2. 영화");
    let ageInput = prompt("본인의 나이를 입력하세요 (예: 25)");
    
    // 나이
    let age = parseInt(ageInput);
    if (age >= 30) ageIndex = 2;
    else if (age >= 20) ageIndex = 1;
    else if (age >= 10) ageIndex = 0;

    // 랜덤하게
    let randomIndex = Math.floor(Math.random() * 5);


    switch(choice) {
        case "1": // 장소
            if(ageIndex !== -1) {
                let item = 하고싶은것들[0][ageIndex][randomIndex];
                alert("📍 추천 장소: " + item);
            } else {
                alert("적절한 연령대를 입력해주세요.");
            }
            break;

        case "2": // 영화
            if(ageIndex !== -1) {
                let item = 하고싶은것들[1][ageIndex][randomIndex];
                alert("🎬 추천 영화: " + item);
            } else {
                alert("적절한 연령대를 입력해주세요.");
            }
            break;

        default:
            alert("1번 또는 2번을 선택해주세요.");
            break;
    }
    </script>
