    <title>배열만들고공유하기</title>

  <body>
    <script>
      //배열만들기 문제 예시  ( 1차원 2차원  3차원 맘껏 사용하기  꼭 3차원을 사용하지 않아도 됨)

      //1차원 배열
      let 먹고싶은것 = ["치킨", "피자", "떡볶이", "볶음밥", "케이크"];

      //2차원배열
      let 가고싶은곳 = [
        ["롯데월드", "홍대", "성수", "코인노래방", "팝업스토어"], //10대
        ["이태원", "익선동", "더현대서울", "부산", "한강공원"], //20대
        ["여의도", "가로수길", "남산", "종로", "망원"], //30대

        ["인셉션", "미나리", "아바타", "도둑들", "부산행"], //30대
      ];

      //3차원배열  (2차원배열을 여러개 가지는 배열)
      let 하고싶은것들 = [
        가고싶은곳 = [
          ["롯데월드", "홍대", "성수", "코인노래방", "팝업스토어"], //10대
          ["이태원", "익선동", "더현대서울", "부산", "한강공원"], //20대
          ["여의도", "가로수길", "남산", "종로", "망원"], //30대
        ],
        보고싶은영화 = [
          ["스파이더맨: 노 웨이 홈", "인사이드아웃","겨울왕국","해리포터","너의 이름은"], //10대

          ["인셉션", "미나리", "아바타", "도둑들", "부산행"], //30대
        ],
      ];

      //하고싶은것을 선택하세요  -  가고싶은곳, 보고싶은영화
      //연령대를 선택하세요  10,20,30
      //램덤하게 보여주기 (아무거나 하나, 꼭 랜덤이 아니어도 됨 )!

      let choice = prompt("추천받고 싶은 것을 선택하세요 1. 장소  2. 영화");
      let age = prompt(
        "본인의 연령대를 입력하세요 ※ 'no'라고 입력해도 괜찮습니다",
      );
      switch (choice) {
        case "1":
          //장소
          if (age >= 30) {
            for (let j = 0; j < 5; j++) {
              // 5개중에 선택
              alert(하고싶은것들[0][2][j]);
            }
          } else if (age >= 20) {
            for (let j = 0; j < 5; j++) {
              //5개 중에 선택
              alert(하고싶은것들[0][1][j]);
            }
          } else if (age >= 10) {
            for (let j = 0; j < 5; j++) {
              //5개 중에 선택
              alert(하고싶은것들[0][0][j]);
            }
          }
          break;

        case "2":
          //영화
          if (age >= 30) {
            for (let j = 0; j < 5; j++) {
              // 5개중에 선택
              alert(하고싶은것들[1][2][j]);
            }
          } else if (age >= 20) {
            for (let j = 0; j < 5; j++) {
              //5개 중에 선택
              alert(하고싶은것들[1][1][j]);
            }
          } else if (age >= 10) {
            for (let j = 0; j < 5; j++) {
              //5개 중에 선택
              alert(하고싶은것들[1][0][j]);
            }
          }
          break;
      }

      /*


      1.사용자가 추천받고 싶은대상 선택
      2.연령대를 입력
      3.연령대를 판단
          3.1 30대면  30대의 추천목록 보여주기
          3.2 20대면  20
          3.3 10대의  10


    
      */


      // 보고싶은영화의 30대에 해당하는 리스트 출력하기
    </script>
