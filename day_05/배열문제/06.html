  <body>
    <script>
      //6. 문제: 아래 numbers 배열에서  가장 큰 수 를 출력하시오
      const numbers = [12, 41, 6, 18, 10];

      max=0;
      for(let i=0; i<numbers.length; i++){
        let item = numbers[i];
        // alert(item);
        if(item > max){
          max = item;
        }
      }

      alert ("가장 큰 값은 " + max + "입니다");
    </script>
  </body>
