  <body>
    <script>
    //8. 문제: 아래  kors 배열에서  평균보다 높은 점수는 몇개인가 ?
      const kors = [90, 80, 70, 99, 100];

      //1.평균 구하기
       let sum = 0;
       let avg = 0;
       
      for(i=0; i<kors.length; i++){
         sum = sum + kors[i];
        //  alert(sum);
        avg = sum / i;
        };

         //2.high 구하기 
      for(j=0; j<kors.length; j++){
         let high = kors[j];
         if(high > avg){
            high = avg;
            }
         };

         alert("kors  배열에서 평균보다 높은 점수는" + high + "개 입니다")


      //3.max의 개수 구하기
    </script>
