<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>11</title>
  </head>
  <body>
    <script>
      //11.  문제 :아래  fruits 배열에  자두 포함 여부 true, false 출력하시오
      let fruits = ["자두", "복숭아", "포도"];
      for (let i = 0; i < fruits.length; i++) {
        if (fruits[i] == "자두") {
          document.write(`${fruits[i]}는 자두입니다. true\n`);
        } else {
          document.write(`${fruits[i]}는 자두가 아닙니다. false\n`);
        }
      }
    </script>
  </body>
</html>
