<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열문제풀이01</title>
</head>
<body>
    <script>
        //1차원 배열 문제 만들고 풀어보기

        //1. 배열의 내용 출력하기(반복을 사용하여 배열의 요소 : 기억장소 한 개 = 변수와 동일한 역할)


        let fruit = ["딸기", "배", "사과"];

        alert(fruit[0]);
        alert(fruit[1]);
        alert(fruit[2]); 
        fruit[3]="망고"; //호출만 하는 게 아니라 요소를 추가하는 기능도 있음

        alert(fruit.length); //배열의 길이 (크기)


        //반복문 직접처리
        for(let i=0; i< fruit.length; i++){
        document.write(fruit[i]);
        }


        //배열매서드 forEach  경험하기
        fruit.forEach( function(  aa){
            alert("hi***" + aa);
        });
    
    </script>

</body>
</html>
