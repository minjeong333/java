<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>hello</title>
</head>
<body>
    <script>
    
    /* => 자바스크립트코드(문서의 요소를 선택할 때는 순서가 중요하다)
        이 위치에서는 오류발생 한다. ∵ 아직 p태그가(클래스가 aa인) 읽혀지지 X.
        ∴ p태그 아래에 위치해야 함


        // shift +  alt + f : 코드 자동 정렬 */
    </script>

    
    <p class="aa">안녕</p>

    <script>

    //올바른 위치(클래스가 aa인 태그를 선책할 수 있음)
    let pTag = document.querySelector(".aa");
    // console.log(pTag); // 선택한 후 확인하자
    pTag.innerHTML = "안녕하세요 ^^!";
    

    </script>
</body>
