<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>텍스트갤러리만들기2(애니메이션추가)</title>

    <style>
      .wrap {
        border: 1px solid black;
        height: 100px;
      }
      .gallery {
        border: 1px solid black;
        height: 80px;
      }
    </style>

    <script>
      let message = [
        " 곧  프론트 프로젝트 곧 시작 합니다!! ",
        " 팀 끼리 재미있게 해 줘요 ^  ",
        "for , if, 1차원배열, 함수 연습 연습",
        "for가 별거나 if가 별거나^^",
        "함수가 별거냐 ^^",
        "배열이 별거냐 ^^ ",
        "객체가 별거냐 ^^",
        "별거 아닌게 모여 별거가 됩니다 ^^",
      ];

      //
      let index = 0;
      function next() {
        // alert("하하");
        const item = message[index];
        console.log(item);

        const gallery = document.querySelector(".gallery");
        console.log(gallery);

        //gallery 내용 변경하기
        gallery.innerHTML = item;

        index = index + 1;

        //
        if (index >= message.length) {
          index = 0;
        }

        // 자바스크립트에서 animate메서드 사용
        // https://developer.mozilla.org/en-US/docs/Web/API/Element/animate

        // gallery.animate();
        gallery.animate(
          [
            { transform: "translateY(100%)" }, // 아래에서 시작
            { transform: "translateY(0)" },    // 원래위치로
          ],

          {
            duration: 1000,
          },
        );
      }
    </script>
  </head>
  <body>
    <!-- 텍스트 갤러리 -->
    <div class="wrap">
      <div class="gallery">******</div>
    </div>

    <button onclick="next()">다음</button>
  </body>
</html>
