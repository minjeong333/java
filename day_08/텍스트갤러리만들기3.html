<html lang="en">

    <script>
      

        let message = [

          "별거 아닌게 모여 별거가 됩니다 ^^",
        ];

        //
        let index=0;
        function next() {
        // alert("하하");
        const item = message[index];
        console.log(item);

        const gallery = document.querySelector(".gallery");
        console.log(gallery);

        //gallery 내용 변경하기
        gallery.innerHTML=item;

      function init(){
