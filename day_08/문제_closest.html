<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>closest문제</title>

    <style>
        .item{
            width: 500px;
            display: flex;
            justify-content: space-between;
            border: 1px solid black;
            padding: 20px;
            margin: 0 auto;
        }
    </style>
    <script>
        function get(obj){
            // alert("ddd");

            const item = obj.closest(".item");
            const treasure = item.querySelector(".treasure")
            const result = treasure.innerHTML;
            alert(result);
        }
    </script>
</head>
<body>

    <div class="item">
         <div class="treasure">금100돈</div>
         <button onclick="get(this)">클릭</button>
    </div>



     <div class="item">
         <div class="treasure">다이아몬드 10캐럿</div>
         <button onclick="get(this)">클릭</button>
    </div>

</body>
</html>
