<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동적태그_메모장</title>
    <style>
        .memo{
            border: 1px solid black;
            width: 300px;
            padding: 10px;

            text-align: center;
        }
        .result{
            border: 1px solid black;
            width: 300px;
            padding: 10px;
        }


        .divItem{
            display: flex;
        }
        .memoContent{
            width: 90%;
            border: 1px solid black;
        }
    </style>

    <script>
        function addMeomo(){
            // alert("eef");

            //태그 생성
            //div - (메모내용 + 삭제) 두 개를 감싸는 영역
            //div - 메모내용
            //div - 삭제

            //1. 사용자가 입력한 input태그의 값(value)를 가져오기
            const content = document.getElementById("content").value;
            console.log(content);

            //2. 새로운 HTML태그들을 생성 (DOM생성 : Document Object Model)
            //전체를 감싸는 부모 div 생성
            const divItem = document.createElement("div");
            // divItem.innerHTML="메모장입니다";
            divItem.classList.add("divItem");

            //item  안쪽에 들어갈 2개의 요소(태그) 만들기
            //메모 내용이 담길 div 생성 및 텍스트 삽입
            const memoContent = document.createElement("div");
            memoContent.classList.add("memoContent");
            memoContent.innerHTML = content;


            //삭제 버튼 역할을 할 div 생성 및 'x'삽입
            const deleteBtn= document.createElement("div");
            memoContent.innerHTML=content;
            deleteBtn.innerHTML="x";

            divItem.appendChild(memoContent);
            divItem.appendChild(deleteBtn);

           const result= document.querySelector(".result");

           result.appendChild(divItem);
        }
    </script>
</head>
<body>

    <!-- 메모장 입력하기 -->
    <div class="memo"> 
        <input type="text" id="content"><button onclick="addMeomo()">추가</button>
    </div>

    <!-- 메모장 결과 나오기 -->
     <div class="result">
     </div>
</body>
</html>
