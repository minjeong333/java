<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .lotto-ball{
            width: 50px;
            height: 50px;

            /*글자의 위아래 줄간격을 height과 똑같이 맞추면 세로 중앙 정렬*/
            line-height: 50px;

            border-radius: 50%;
            background-color: aqua;
            text-align: center;
            display: inline-block;
            margin-left: 20px;
        }
    </style>
    <script>
        /*
        문제) 로또공 6개 띄우기
        1. 로또번호 만들기 (6)
        2. 로또공 6개 만들기
            2.1. 부모 영역 선택하기
            2.2. 반복(6번)
                -div태그 생성하기
                -style주기(style 만들고 추가하기)
                -로또번호 넣기
                -부모 영역에 추가하기(1초있다)
        */

        function getLottoNumbers(){
            const lottos = [15, 8, 42, 13, 9, 41];
            return lottos;
        }

        function getRandomColor(){
            const colors = [
            "red", "blue", "green", "yellow", "purple", "orange", 
            "pink", "brown", "cyan", "magenta", "lime", "teal", 
            "navy", "gold", "coral", "salmon", "beige", "khaki", 
            "olive", "maroon", "turquoise", "lavender", "violet"
            ];

            const result = Math.random()*colors.length;//0~24
            const finalResult = Math.floor(result);

            return colors[finalResult];
        }

        function createLotto(){
            const lottos = getLottoNumbers();
            const result = document.getElementById("result");
            
            // 부모영역초기화: 로또 새로 뽑으면 기존의 6개 공 사라짐
            result.innerHTML="";

            for(let i=0; i<lottos.length; i++){
                let ball = document.createElement("div");
                ball.innerHTML = lottos[i];
                ball.classList.add("lotto-ball");

                // 랜덤컬러
                ball.style.backgroundColor = getRandomColor();

                // setTimeout(callback(함수를 넘겨줘야함), 밀리초); 밀리초 후에 callback 함수를 실행
                setTimeout(function(){result.appendChild(ball);}, 1000);
            }
        }
    </script>
</head>
<body>
    <button onclick="createLotto()">로또공 나오기</button>
    <div id="result"></div>
</body>
</html>
