<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자기소개서</title>
    <style>
        .box{
            border: 2px solid black;
            width:600px;
            padding: 20px;
        }
        table{
            border: 1px solid black
        }
        td{
            border: 1px solid black;
            width: 200px;
        }
    </style>
</head>
<body>

    <h1>공간분할 태그(그룹짓기)</h1>
    <div class="box">
        <h2>Who am I?</h2>
        <p>홍윤성: 기계공학과를 전공하였고, 현재는 개발자가 되기로 마음 먹었습니다.
        <br>아직 프로그래밍을 많이 접해보지 않아서 잘은 모르겠으나
        <br><mark>백엔드개발</mark>에 관심이 좀 더 있습니다.
    </div>
    <div class="box">
        <ul>
            <li>html</li>
            <li>css</li>
            <li>js</li>
        </ul>
    </div>
    <div class="box">
        <h2>학력사항</h2>
        <table>
            <tr>
                <td>a</td><td>b</td><td>c</td><td>d</td>
            </tr>
            <tr>
                <td>d</td><td>d</td><td>d</td><td>d</td>
            </tr>
        </table>
    </div>
</body>
</html>
