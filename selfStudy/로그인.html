<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 화면 만들기</title>
    <style>
        
        .container {
            width: 400px;
            padding: 20px;
            border: 1px solid black;
            margin: 0 auto;
        }
        .logo{
            /* border: 1px solid red; */
            width: 200px;
            height: 200px;
            margin: 0 auto;
            background: url(./로그인이미지.png);
            background-size: cover;
            background-position: center;
        }
        .text{
            width: 300px;
            margin: 0 auto;
            padding: 20px;
            /* border: 1px solid blue; */
        }
        input{
            margin-top: 10px;
            width: 97%;
            height: 30px;
        }
        button{
            margin-top: 10px;
            width: 100%;
            height: 40px;
            background-color:antiquewhite;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo"></div>
        <div class="text">
            <input type="text" placeholder="ID">
            <input type="password" placeholder="Password">
            <button>로그인</button>
        </div>
    </div>
</body>
</html>
