<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM요소</title>
    <script>
        function change(){
            // alert("dfdg");
            // 스타일적용

            //선택
            const wrap = document.getElementById("wrap");
            //선택 잘 되었는지 확인 => 없으면 null

            console.log(wrap);

            wrap.style.width="100px";
            wrap.style.heigt="100px";
            wrap.style.backgroundColor="green";
            wrap.innerHTML="<p>새로운 내용으로 바꾼다</p>";
        }

        function unChange(){
            // alert("dfdf");
            const wrap = document.getElementById("wrap");
            console.log(wrap);

            wrap.style.width="";
            wrap.style.heigt="";
            wrap.style.backgroundColor="";
            wrap.innerHTML="<p>취소되었다</p>";

            // 
        }
    </script>
</head>
<body>

    <h1> DOM다루기</h1>

    <p>
        웹문서(웹페이지)를 자바스크립트에서 사용할 수 있도록 객체형태로 제공함 (태그 => 속성+기능)
    </p>

    <h2> id 로 선택하기</h2>
    <p> id가 wrap인 요소를 선택하여 스타일 변경하기</p>

    <div id ="wrap">스타일적용</div>

     <button onclick="change()">스타일 적용</button>
     <button onclick="unchange()">스타일 취소</button>
</body>
</html>
