<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>css스타일변경하기3</title>
    <style>
        div{
            display: none;
        }
        div .on{ /*div태그이면서 oc클래스를 가진 요소 선택*/
            display: block;
        }

        .on{
            display: block;

        }
        
     </style>

</head>
<body>

    <script>

       function toggle(){
        // alert("dfdf");
        const item = document.getElementById("item");
        item.classList.toggle("on"); /*classList => 개발자가 준 클래스를 목록형태로 제공함*/
    //     const item1 = document.querySelector(".a"); // .붙이는 거 잊지말기
    //     console.log(item1);
    //     item1.classList.replace("a","b");
       }

    </script>


   
    <div class="on">내용 보이기</div>
    <button onclick="toggle()">토글</button>

    

</body>
</html>
